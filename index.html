<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passeggiate Romane - Itinerari Tematici</title>
    <meta name="description" content="Scopri Roma attraverso passeggiate culturali guidate da personaggi storici. Itinerari tematici tra cinema, musica e arte.">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0f;
            --bg-card: #13131a;
            --bg-elevated: #1a1a24;
            --accent-warm: #c8956c;
            --accent-gold: #d4a853;
            --accent-rose: #b5667a;
            --text-primary: #f0ece4;
            --text-secondary: #9a9490;
            --text-muted: #5e5a56;
            --border-subtle: rgba(200,149,108,0.15);
            --glass: rgba(19,19,26,0.85);
            --glass-border: rgba(200,149,108,0.12);
            --shadow-dramatic: 0 30px 80px rgba(0,0,0,0.6);
            --radius-sm: 6px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --radius-xl: 32px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* === TOPBAR === */
        #navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            height: 64px;
            background: rgba(10,10,15,0.7);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-bottom: 1px solid var(--border-subtle);
            transition: all 0.4s ease;
        }

        #navbar h1 {
            font-family: 'Space Mono', monospace;
            font-size: 0.85em;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent-warm);
            font-weight: 700;
        }

        #nav-buttons { display: flex; gap: 8px; }

        #nav-buttons button {
            font-family: 'Inter', sans-serif;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-subtle);
            padding: 8px 20px;
            border-radius: 100px;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        #nav-buttons button:hover {
            background: var(--accent-warm);
            color: var(--bg-deep);
            border-color: var(--accent-warm);
            transform: none;
        }

        /* === VIEWS === */
        .view { display: none; }
        .view.active { display: block; }

        /* ========================================
           HOME VIEW - Cinematic Full-Screen
           ======================================== */
        #home-view {
            padding-top: 64px;
            min-height: 100vh;
        }

        .hero-section {
            position: relative;
            height: calc(100vh - 64px);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1525874684015-58379d421a52?auto=format&fit=crop&w=1920&q=80') center/cover;
            filter: brightness(0.25) saturate(0.6);
            transform: scale(1.05);
            animation: heroBreath 20s ease-in-out infinite alternate;
        }

        @keyframes heroBreath {
            from { transform: scale(1.05); }
            to { transform: scale(1.12); }
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg,
                rgba(10,10,15,0.5) 0%,
                rgba(10,10,15,0.2) 40%,
                rgba(10,10,15,0.8) 100%);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 800px;
            padding: 0 30px;
        }

        .hero-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.75em;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--accent-warm);
            margin-bottom: 24px;
            opacity: 0;
            animation: fadeUp 1s ease 0.3s forwards;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5em, 7vw, 5.5em);
            font-weight: 900;
            line-height: 1.05;
            color: var(--text-primary);
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeUp 1s ease 0.5s forwards;
        }

        .hero-title em {
            font-style: italic;
            color: var(--accent-warm);
        }

        .hero-subtitle {
            font-size: 1.1em;
            color: var(--text-secondary);
            line-height: 1.7;
            max-width: 550px;
            margin: 0 auto 40px;
            opacity: 0;
            animation: fadeUp 1s ease 0.7s forwards;
        }

        .hero-scroll-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 0.7em;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: bounce 2s ease infinite;
        }

        .hero-scroll-hint .line {
            width: 1px;
            height: 40px;
            background: linear-gradient(to bottom, var(--accent-warm), transparent);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(10px); }
        }

        /* === ITINERARI CARDS SECTION === */
        #itinerari-section {
            padding: 100px 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-header {
            margin-bottom: 60px;
        }

        .section-header .label {
            font-family: 'Space Mono', monospace;
            font-size: 0.7em;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--accent-warm);
            margin-bottom: 12px;
        }

        .section-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8em;
            font-weight: 700;
            color: var(--text-primary);
        }

        .itinerari-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: 40px;
        }

        /* === CARD - Magazine Style === */
        .itinerario-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
        }

        .itinerario-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-dramatic);
            border-color: rgba(200,149,108,0.3);
        }

        .card-image {
            height: 380px;
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
        }

        .card-image::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 60%;
            background: linear-gradient(to top, var(--bg-card) 0%, transparent 100%);
        }

        .card-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(10,10,15,0.7);
            backdrop-filter: blur(10px);
            color: var(--accent-warm);
            padding: 6px 16px;
            border-radius: 100px;
            font-family: 'Space Mono', monospace;
            font-size: 0.65em;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            border: 1px solid var(--glass-border);
            z-index: 2;
        }

        .card-content {
            padding: 30px 30px 35px;
            position: relative;
            margin-top: -60px;
            z-index: 2;
        }

        .card-content h3 {
            font-family: 'Playfair Display', serif;
            color: var(--text-primary);
            font-size: 1.8em;
            font-weight: 700;
            margin-bottom: 6px;
            line-height: 1.2;
        }

        .card-subtitle {
            color: var(--accent-warm);
            font-size: 0.85em;
            margin-bottom: 16px;
            font-style: italic;
            font-family: 'Playfair Display', serif;
        }

        .card-description {
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 24px;
            font-size: 0.9em;
        }

        .card-stats {
            display: flex;
            gap: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border-subtle);
            margin-bottom: 24px;
        }

        .stat { text-align: left; }

        .stat-value {
            font-family: 'Space Mono', monospace;
            font-size: 1.3em;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-label {
            font-size: 0.7em;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .card-button {
            width: 100%;
            padding: 14px;
            background: var(--accent-warm);
            color: var(--bg-deep);
            border: none;
            border-radius: var(--radius-xl);
            font-family: 'Inter', sans-serif;
            font-size: 0.85em;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .card-button:hover {
            background: var(--accent-gold);
            transform: none;
            box-shadow: 0 8px 30px rgba(200,149,108,0.3);
        }

        /* ========================================
           ITINERARY VIEW - Split Cinematic Layout
           ======================================== */
        #itinerary-view {
            padding-top: 64px;
            min-height: calc(100vh - 64px);
        }

        #itinerary-view.active { display: flex; flex-direction: column; }

        /* --- Top Strip: Horizontal Timeline --- */
        .timeline-strip {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-subtle);
            padding: 0 40px;
            display: flex;
            align-items: stretch;
            height: 100px;
            overflow-x: auto;
            gap: 0;
        }

        .timeline-strip::-webkit-scrollbar { height: 3px; }
        .timeline-strip::-webkit-scrollbar-track { background: transparent; }
        .timeline-strip::-webkit-scrollbar-thumb { background: var(--accent-warm); border-radius: 10px; }

        #timeline-title, #progress-bar, #progress-fill { display: none; }

        .timeline-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 160px;
            padding: 12px 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
            position: relative;
            flex-shrink: 0;
        }

        .timeline-item::after {
            content: '';
            position: absolute;
            right: 0;
            top: 25%;
            height: 50%;
            width: 1px;
            background: var(--border-subtle);
        }

        .timeline-item:last-child::after { display: none; }

        .timeline-item:hover {
            background: rgba(200,149,108,0.05);
        }

        .timeline-item.current {
            border-bottom-color: var(--accent-warm);
            background: rgba(200,149,108,0.08);
        }

        .timeline-item.completed {
            border-bottom-color: #4a7c59;
            background: rgba(74,124,89,0.05);
        }

        .timeline-item.upcoming { opacity: 0.4; }

        .timeline-icon { font-size: 1.4em; margin-bottom: 4px; }

        .timeline-time {
            font-family: 'Space Mono', monospace;
            font-size: 0.75em;
            color: var(--accent-warm);
            font-weight: 700;
        }

        .timeline-name {
            font-size: 0.75em;
            color: var(--text-secondary);
            text-align: center;
            white-space: nowrap;
        }

        .timeline-duration {
            font-size: 0.65em;
            color: var(--text-muted);
        }

        /* --- Main Split View --- */
        .itinerary-main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: calc(100vh - 164px);
        }

        /* Left: Visual Panel */
        .visual-panel {
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .tappa-image-container {
            height: 50%;
            position: relative;
            overflow: hidden;
            background: var(--bg-card);
        }

        .tappa-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.6s ease;
        }

        .tappa-image-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg,
                transparent 50%,
                rgba(10,10,15,0.8) 100%);
        }

        .tappa-image-label {
            position: absolute;
            bottom: 24px;
            left: 24px;
            z-index: 2;
        }

        .tappa-image-label .tappa-num {
            font-family: 'Space Mono', monospace;
            font-size: 0.65em;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent-warm);
            margin-bottom: 4px;
        }

        .tappa-image-label h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8em;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.2;
        }

        .tappa-image-label .moment-badge {
            display: inline-block;
            margin-top: 8px;
            font-size: 0.7em;
            background: rgba(200,149,108,0.15);
            color: var(--accent-warm);
            padding: 4px 12px;
            border-radius: 100px;
            font-weight: 500;
        }

        #map-container {
            height: 50%;
            position: relative;
        }

        #map { width: 100%; height: 100%; }

        /* Right: Content Panel */
        .content-panel {
            background: var(--bg-deep);
            overflow-y: auto;
            padding: 40px;
        }

        .content-panel::-webkit-scrollbar { width: 5px; }
        .content-panel::-webkit-scrollbar-track { background: transparent; }
        .content-panel::-webkit-scrollbar-thumb { background: var(--accent-warm); border-radius: 10px; }

        /* Tappa Header in content panel */
        #tappa-details {
            height: auto;
            background: transparent;
            padding: 0;
            overflow: visible;
            box-shadow: none;
        }

        #tappa-header {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border-subtle);
        }

        #tappa-numero {
            font-family: 'Playfair Display', serif;
            font-size: 3.5em;
            color: var(--accent-warm);
            font-weight: 900;
            line-height: 1;
            opacity: 0.3;
        }

        #tappa-nome { flex: 1; }

        #tappa-nome h2 {
            font-family: 'Playfair Display', serif;
            color: var(--text-primary);
            font-size: 1.5em;
            font-weight: 700;
            margin-bottom: 4px;
        }

        #tappa-nome .descrizione-breve {
            color: var(--text-secondary);
            font-size: 0.9em;
            line-height: 1.6;
        }

        #tappa-orario { text-align: right; }

        #tappa-orario .time {
            font-family: 'Space Mono', monospace;
            font-size: 1.4em;
            color: var(--accent-warm);
            font-weight: 700;
        }

        #tappa-orario .moment {
            font-size: 0.75em;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* === Content Sections === */
        .esperienza-section {
            margin: 24px 0;
            padding: 24px;
            background: var(--bg-card);
            border-radius: var(--radius-md);
            border-left: 3px solid var(--accent-warm);
            border: 1px solid var(--border-subtle);
            border-left: 3px solid var(--accent-warm);
        }

        .esperienza-section h3 {
            font-family: 'Playfair Display', serif;
            color: var(--text-primary);
            font-size: 1.1em;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .esperienza-section p {
            color: var(--text-secondary);
            line-height: 1.8;
            font-size: 0.9em;
        }

        .esperienza-section p strong {
            color: var(--accent-warm);
        }

        /* Music Player */
        .music-player {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            padding: 24px;
            border-radius: var(--radius-md);
            margin: 24px 0;
            position: relative;
            overflow: hidden;
        }

        .music-player::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-warm), var(--accent-gold), var(--accent-rose));
        }

        .music-player h4 {
            font-family: 'Playfair Display', serif;
            color: var(--text-primary);
            margin-bottom: 16px;
            font-size: 1.1em;
        }

        .music-player audio {
            width: 100%;
            margin-bottom: 12px;
            border-radius: var(--radius-sm);
            filter: invert(1) hue-rotate(180deg) brightness(0.9);
        }

        .music-description {
            font-size: 0.85em;
            line-height: 1.7;
            font-style: italic;
            color: var(--text-secondary);
        }

        /* Citation */
        .citazione-box {
            background: var(--bg-elevated);
            border-left: 3px solid var(--accent-rose);
            border: 1px solid var(--border-subtle);
            border-left: 3px solid var(--accent-rose);
            padding: 28px;
            border-radius: var(--radius-md);
            margin: 24px 0;
            position: relative;
        }

        .citazione-box::before {
            content: '"';
            font-family: 'Playfair Display', serif;
            font-size: 5em;
            color: var(--accent-rose);
            opacity: 0.15;
            position: absolute;
            top: -10px;
            left: 16px;
            line-height: 1;
        }

        .citazione-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.05em;
            font-style: italic;
            line-height: 1.8;
            color: var(--text-primary);
            margin-bottom: 12px;
            position: relative;
        }

        .citazione-author {
            text-align: right;
            color: var(--accent-warm);
            font-size: 0.85em;
            font-weight: 500;
        }

        /* Atmosphere Grid */
        .atmosfera-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        .atmosfera-item {
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            padding: 16px;
            border-radius: var(--radius-md);
            text-align: center;
            transition: all 0.3s ease;
        }

        .atmosfera-item:hover {
            border-color: var(--accent-warm);
            transform: translateY(-2px);
        }

        .atmosfera-item .icon { font-size: 1.6em; margin-bottom: 6px; }
        .atmosfera-item .label {
            font-size: 0.65em;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .atmosfera-item .value {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.85em;
        }

        /* Navigation Buttons */
        #tappa-navigation {
            display: flex;
            gap: 12px;
            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px solid var(--border-subtle);
        }

        .nav-btn {
            flex: 1;
            padding: 14px;
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-xl);
            font-family: 'Inter', sans-serif;
            font-size: 0.8em;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .nav-btn.prev {
            background: transparent;
            color: var(--text-secondary);
        }

        .nav-btn.prev:hover {
            background: var(--bg-elevated);
            border-color: var(--accent-warm);
            color: var(--text-primary);
        }

        .nav-btn.next {
            background: var(--accent-warm);
            color: var(--bg-deep);
            border-color: var(--accent-warm);
        }

        .nav-btn.next:hover {
            background: var(--accent-gold);
            border-color: var(--accent-gold);
            transform: none;
        }

        .nav-btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
            pointer-events: none;
        }
        /* === Animations === */
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.6s ease forwards;
        }

        .fade-in-delay-1 { animation-delay: 0.1s; }
        .fade-in-delay-2 { animation-delay: 0.2s; }
        .fade-in-delay-3 { animation-delay: 0.3s; }

        /* === Responsive === */
        @media (max-width: 1024px) {
            .itinerary-main {
                grid-template-columns: 1fr;
                height: auto;
            }

            .visual-panel { height: 50vh; }

            .tappa-image-container { height: 55%; }
            #map-container { height: 45%; }

            .content-panel {
                height: auto;
                min-height: 50vh;
            }
        }

        @media (max-width: 768px) {
            #navbar { padding: 0 20px; }
            #navbar h1 { font-size: 0.7em; letter-spacing: 2px; }

            .hero-title { font-size: clamp(2em, 10vw, 3em); }

            .itinerari-grid { grid-template-columns: 1fr; }
            #itinerari-section { padding: 60px 20px; }

            .timeline-strip { padding: 0 16px; }
            .timeline-item { min-width: 130px; padding: 10px 16px; }

            .itinerary-main { grid-template-columns: 1fr; }
            .visual-panel { height: 45vh; }
            .content-panel { padding: 24px; }

            .atmosfera-grid { grid-template-columns: 1fr 1fr; }

            .tappa-image-label h2 { font-size: 1.3em; }
        }

        @media (max-width: 480px) {
            .card-image { height: 260px; }
            .card-content { padding: 20px; }
            .atmosfera-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>
    <!-- Navigation Bar -->
    <div id="navbar">
        <h1>🏛️ Passeggiate Romane</h1>
        <div id="nav-buttons">
            <button onclick="showView('home')">🏠︎</button>
            <button id="back-to-itinerary-btn" onclick="showView('itinerary')" style="display:none;">Torna
                all'Itinerario</button>
        </div>
    </div>

    <!-- HOME VIEW -->
    <div id="home-view" class="view active">
        <!-- Hero Section -->
        <div class="hero-section">
            <div class="hero-bg"></div>
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <div class="hero-label">Itinerari Tematici</div>
                <h2 class="hero-title">Scopri Roma attraverso <em>passeggiate romane</em></h2>
                <p class="hero-subtitle">Scopri Roma attraverso passeggiate culturali guidate da personaggi storici</p>
            </div>
            <div class="hero-scroll-hint">
                <span>Esplora</span>
                <div class="line"></div>
            </div>
        </div>

        <!-- Cards Section -->
        <div id="itinerari-section">
            <div class="section-header">
                <div class="label">Percorsi Disponibili</div>
                <h2>Itinerari Tematici</h2>
            </div>
            <div id="itinerari-container" class="itinerari-grid">
                <!-- Le card degli itinerari saranno generate dinamicamente -->
            </div>
        </div>
    </div>

    <!-- ITINERARY VIEW -->
    <div id="itinerary-view" class="view">
        <!-- Horizontal Timeline -->
        <div class="timeline-strip">
            <div id="timeline-title">Timeline Itinerario</div>
            <div id="progress-bar"><div id="progress-fill"></div></div>
            <div id="timeline-items" style="display:contents;">
                <!-- Timeline items generati dinamicamente -->
            </div>
        </div>

        <!-- Main Split View -->
        <div class="itinerary-main">
            <!-- Left: Image + Map -->
            <div class="visual-panel">
                <div class="tappa-image-container">
                    <img id="tappa-image" class="tappa-image" src="" alt="">
                    <div class="tappa-image-overlay"></div>
                    <div class="tappa-image-label">
                        <div class="tappa-num" id="tappa-image-num"></div>
                        <h2 id="tappa-image-name"></h2>
                        <span class="moment-badge" id="tappa-image-moment"></span>
                    </div>
                </div>
                <div id="map-container">
                    <div id="map"></div>
                </div>
            </div>

            <!-- Right: Content & Details -->
            <div class="content-panel">
                <div id="tappa-details">
                    <div id="tappa-header">
                        <div id="tappa-numero"></div>
                        <div id="tappa-nome">
                            <h2></h2>
                            <p class="descrizione-breve"></p>
                        </div>
                        <div id="tappa-orario">
                            <div class="time"></div>
                            <div class="moment"></div>
                        </div>
                    </div>

                    <div id="tappa-content">
                        <!-- Contenuto dinamico -->
                    </div>

                    <div id="tappa-navigation">
                        <button class="nav-btn prev" onclick="previousTappa()">← Tappa Precedente</button>
                        <button class="nav-btn next" onclick="nextTappa()">Tappa Successiva →</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ========================================
        // VARIABILI GLOBALI
        // ========================================
        let itinerariData = null;
        let currentItinerario = null;
        let currentTappaIndex = 0;
        let map = null;
        let markers = [];
        let routeLine = null;

        // Mapping immagini per poi_id
        const tappaImages = {
            'Trastevere': 'images/trasteee.jpg',
            'trevi_fontana': 'images/fontana_di_trevi.jpg',
            'piazza_del_popolo': 'images/piazzaPopolo.jpg',
            'Via_Vittorio_Veneto': 'images/viavittorioveneto.jpg'
        };

        // Icone momenti della giornata
        const momentIcons = {
            'alba': '🌅',
            'mattino': '☀️',
            'mezzogiorno': '🌞',
            'pomeriggio': '🌤️',
            'tramonto': '🌆',
            'sera': '🌃'
        };

        // ========================================
        // INIZIALIZZAZIONE
        // ========================================
        async function init() {
            console.log('🚀 Inizializzazione Passeggiate Romane...');
            await loadItinerariData();
            renderItinerariCards();
        }

        // ========================================
        // CARICAMENTO DATI
        // ========================================
        async function loadItinerariData() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error('File non trovato');

                const data = await response.json();
                itinerariData = data.itinerari;
                console.log(`✅ Caricati ${itinerariData.length} itinerari`);
            } catch (error) {
                console.error('❌ Errore caricamento:', error);
                itinerariData = getEmbeddedItinerari();
            }
        }

        function getEmbeddedItinerari() {
            return [{
                id: "respighi_fontane",
                nome: "Le Fontane di Roma",
                sottotitolo: "Poema sinfonico di Ottorino Respighi",
                personaggio: { nome: "Ottorino Respighi", anni: "1879-1936" },
                descrizione: "Segui le note del poema sinfonico attraverso le fontane di Roma.",
                durata_totale_ore: 8,
                distanza_totale_km: 6.5,
                tappe: [
                    {
                        numero: 1,
                        nome: "Villa Giulia",
                        coordinate: [41.9167, 12.4792],
                        orario_consigliato: "06:00",
                        momento_giornata: "alba",
                        durata_visita_min: 45,
                        descrizione_breve: "Fontana rinascimentale all'alba"
                    }
                ]
            }];
        }

        // ========================================
        // RENDERING HOME
        // ========================================
        function renderItinerariCards() {
            const container = document.getElementById('itinerari-container');
            container.innerHTML = '';

            itinerariData.forEach(itinerario => {
                const card = document.createElement('div');
                card.className = 'itinerario-card';
                card.onclick = () => startItinerario(itinerario.id);

                card.innerHTML = `
<div class="card-image" style="background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.1)), url('https://images.unsplash.com/photo-1525874684015-58379d421a52?auto=format&fit=crop&w=600&q=80')">                        <div class="card-badge">${itinerario.tema || 'Culturale'}</div>
                    </div>
                    <div class="card-content">
                        <h3>${itinerario.nome}</h3>
                        
                        <p class="card-subtitle">${itinerario.sottotitolo || ''}</p>
                        <p class="card-description">${itinerario.descrizione}</p>
                        
                        <div class="card-stats">
                            <div class="stat">
                                <div class="stat-value">${itinerario.durata_totale_ore}h</div>
                                <div class="stat-label">⏱️ Durata</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">${itinerario.tappe.length}</div>
                                <div class="stat-label">📍 Tappe</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">${itinerario.distanza_totale_km}km</div>
                                <div class="stat-label">🚶 Distanza</div>
                            </div>
                        </div>
                        
                        <button class="card-button">Inizia Passeggiata →</button>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        // ========================================
        // START ITINERARIO
        // ========================================
        function startItinerario(itinerarioId) {
            currentItinerario = itinerariData.find(it => it.id === itinerarioId);
            if (!currentItinerario) return;

            currentTappaIndex = 0;

            showView('itinerary');
            initMap();
            renderTimeline();
            loadTappa(0);
        }

        // ========================================
        // GESTIONE VIEWS
        // ========================================
        function showView(viewName) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(`${viewName}-view`).classList.add('active');

            const backBtn = document.getElementById('back-to-itinerary-btn');
            backBtn.style.display = viewName === 'itinerary' ? 'inline-block' : 'none';
        }

        // ========================================
        // MAPPA
        // ========================================
        function initMap() {
            if (map) map.remove();

            map = L.map('map').setView([41.9028, 12.4964], 13);

            L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            drawRoute();
            addMarkers();
        }

        function drawRoute() {
            const coordinates = currentItinerario.tappe.map(t => t.coordinate);

            if (routeLine) map.removeLayer(routeLine);

            routeLine = L.polyline(coordinates, {
                color: '#c8956c',
                weight: 3,
                opacity: 0.8,
                dashArray: '8, 12',
                lineJoin: 'round'
            }).addTo(map);

            map.fitBounds(routeLine.getBounds(), { padding: [50, 50] });
        }

        function addMarkers() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            currentItinerario.tappe.forEach((tappa, index) => {
                const icon = momentIcons[tappa.momento_giornata] || '📍';

                const marker = L.marker(tappa.coordinate, {
                    icon: L.divIcon({
                        html: `<div style="
                            font-size: 1.4em;
                            width: 40px;
                            height: 40px;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            background: rgba(10,10,15,0.8);
                            border: 2px solid #c8956c;
                            border-radius: 50%;
                            backdrop-filter: blur(8px);
                        ">${icon}</div>`,
                        className: 'custom-marker',
                        iconSize: [40, 40]
                    })
                }).addTo(map);

                marker.bindPopup(`<b>Tappa ${tappa.numero}</b><br>${tappa.nome}`);
                marker.on('click', () => loadTappa(index));

                markers.push(marker);
            });
        }

        // ========================================
        // TIMELINE
        // ========================================
        function renderTimeline() {
            const container = document.getElementById('timeline-items');
            container.innerHTML = '';

            currentItinerario.tappe.forEach((tappa, index) => {
                const item = document.createElement('div');
                item.className = 'timeline-item';

                if (index < currentTappaIndex) item.classList.add('completed');
                else if (index === currentTappaIndex) item.classList.add('current');
                else item.classList.add('upcoming');

                item.onclick = () => loadTappa(index);

                item.innerHTML = `
                    <div class="timeline-icon">${momentIcons[tappa.momento_giornata]}</div>
                    <div class="timeline-time">${tappa.orario_consigliato}</div>
                    <div class="timeline-name">${tappa.nome}</div>
                    <div class="timeline-duration">${tappa.durata_visita_min} min</div>
                `;

                container.appendChild(item);
            });

            updateProgress();
        }

        function updateProgress() {
            const progress = ((currentTappaIndex + 1) / currentItinerario.tappe.length) * 100;
            document.getElementById('progress-fill').style.width = `${progress}%`;
        }

        // ========================================
        // CARICA TAPPA
        // ========================================
        function loadTappa(index) {
            currentTappaIndex = index;
            const tappa = currentItinerario.tappe[index];

            // Header
            document.getElementById('tappa-numero').textContent = `${tappa.numero}`;
            document.querySelector('#tappa-nome h2').textContent = tappa.nome;
            document.querySelector('#tappa-nome .descrizione-breve').textContent = tappa.descrizione_breve || '';
            document.querySelector('#tappa-orario .time').textContent = tappa.orario_consigliato;
            document.querySelector('#tappa-orario .moment').textContent = tappa.momento_giornata;

            // Image panel
            const imgEl = document.getElementById('tappa-image');
            const imgSrc = tappaImages[tappa.poi_id] || 'https://images.unsplash.com/photo-1525874684015-58379d421a52?auto=format&fit=crop&w=800&q=80';
            imgEl.src = imgSrc;
            imgEl.alt = tappa.nome;

            document.getElementById('tappa-image-num').textContent = `Tappa ${tappa.numero}`;
            document.getElementById('tappa-image-name').textContent = tappa.nome;
            document.getElementById('tappa-image-moment').textContent =
                `${momentIcons[tappa.momento_giornata] || ''} ${tappa.orario_consigliato} — ${tappa.momento_giornata}`;

            // Content
            renderTappaContent(tappa);

            // Timeline
            renderTimeline();

            // Mappa: centra su tappa corrente
            map.setView(tappa.coordinate, 16, { animate: true });
            markers[index].openPopup();

            // Buttons
            document.querySelector('.nav-btn.prev').disabled = index === 0;
            document.querySelector('.nav-btn.next').disabled = index === currentItinerario.tappe.length - 1;

            // Scroll content panel to top
            document.querySelector('.content-panel').scrollTop = 0;
        }

        function renderTappaContent(tappa) {
            const container = document.getElementById('tappa-content');
            container.innerHTML = '';
        // Aggiungi questo blocco alla fine della funzione renderTappaContent(tappa)

            // Storia e Curiosità
            if (tappa.storia || tappa.curiosita) {
                const storiaSec = document.createElement('div');
                storiaSec.className = 'esperienza-section fade-in';
                storiaSec.innerHTML = `
                    <h3>📜 Storia e Curiosità</h3>
                    ${tappa.storia ? `<p><strong>Storia:</strong> ${tappa.storia}</p>` : ''}
                    ${tappa.curiosita ? `<p><strong>Curiosità:</strong> ${tappa.curiosita}</p>` : ''}
                `;
                container.appendChild(storiaSec);
            }

            // Esperienza Culturale
            if (tappa.esperienza_culturale) {
                const exp = tappa.esperienza_culturale;

                // Musica
                if (exp.musica) {
                    const musicDiv = document.createElement('div');
                    musicDiv.className = 'music-player fade-in fade-in-delay-1';
                    musicDiv.innerHTML = `
                        <h4>🎵 ${exp.musica.movimento || 'Brano Musicale'}</h4>
                        <audio controls>
                            <source src="audio/${tappa.poi_id}.mp3" type="audio/mpeg">
                            Il tuo browser non supporta l'audio.
                        </audio>
                        <div class="music-description">
                            ${exp.musica.descrizione_musicale || ''}
                        </div>
                    `;
                    container.appendChild(musicDiv);
                }

                // Letteratura
                if (exp.letteratura) {
                    const litDiv = document.createElement('div');
                    litDiv.className = 'citazione-box fade-in fade-in-delay-2';
                    litDiv.innerHTML = `
                        <div class="citazione-text">"${exp.letteratura.citazione}"</div>
                        <div class="citazione-author">— ${exp.letteratura.autore}, <em>${exp.letteratura.opera}</em> (${exp.letteratura.anno})</div>
                    `;
                    container.appendChild(litDiv);
                }

                // Atmosfera
                if (exp.atmosfera) {
                    const atmDiv = document.createElement('div');
                    atmDiv.className = 'esperienza-section fade-in fade-in-delay-3';
                    atmDiv.innerHTML = `
                        <h3>🌤️ Atmosfera del Luogo</h3>
                        <div class="atmosfera-grid">
                            <div class="atmosfera-item">
                                <div class="icon">💡</div>
                                <div class="label">Luce</div>
                                <div class="value">${exp.atmosfera.luce || 'N/A'}</div>
                            </div>
                            <div class="atmosfera-item">
                                <div class="icon">🌡️</div>
                                <div class="label">Temperatura</div>
                                <div class="value">${exp.atmosfera.temperatura_stimata || 'N/A'}</div>
                            </div>
                            <div class="atmosfera-item">
                                <div class="icon">👥</div>
                                <div class="label">Affollamento</div>
                                <div class="value">${exp.atmosfera.affollamento || 'N/A'}</div>
                            </div>
                            <div class="atmosfera-item">
                                <div class="icon">😌</div>
                                <div class="label">Emozione</div>
                                <div class="value">${exp.atmosfera.emozione_target || 'N/A'}</div>
                            </div>
                        </div>
                        ${exp.atmosfera.consiglio_fotografico ? `<p style="margin-top: 15px;"><strong>📸 Fotografia:</strong> ${exp.atmosfera.consiglio_fotografico}</p>` : ''}
                    `;
                    container.appendChild(atmDiv);
                }
            }

            // Dove Mangiare
            if (tappa.dove_mangiare && tappa.dove_mangiare.length > 0) {
                const mangiareDiv = document.createElement('div');
                mangiareDiv.className = 'esperienza-section fade-in fade-in-delay-3';
                mangiareDiv.innerHTML = `
                    <h3>🍽️ Dove Mangiare</h3>
                    <div style="display: grid; gap: 16px;">
                        ${tappa.dove_mangiare.map(luogo => `
                            <div style="background: var(--bg-elevated); border: 1px solid var(--border-subtle); padding: 16px; border-radius: var(--radius-md);">
                                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px;">
                                    <h4 style="margin: 0; color: var(--text-primary); font-size: 1.1em;">${luogo.nome}</h4>
                                    <span style="background: var(--accent-warm); color: var(--bg-deep); padding: 4px 8px; border-radius: 12px; font-size: 0.8em; font-weight: 600;">${luogo.fascia_prezzo}</span>
                                </div>
                                <p style="color: var(--text-secondary); font-size: 0.9em; margin-bottom: 8px;"><em>${luogo.tipo}</em></p>
                                <p style="color: var(--text-secondary); font-size: 0.9em; margin-bottom: 8px;"><strong>📍</strong> ${luogo.indirizzo || 'Indirizzo non disponibile'}</p>
                                <p style="color: var(--text-secondary); font-size: 0.9em; margin-bottom: 12px;">${luogo.descrizione}</p>
                                <div style="display: flex; justify-content: space-between; align-items: center; font-size: 0.8em; color: var(--text-muted);">
                                    <span>🕐 ${luogo.orari}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(mangiareDiv);
            }
        }

        // ========================================
        // NAVIGAZIONE TAPPE
        // ========================================
        function previousTappa() {
            if (currentTappaIndex > 0) {
                loadTappa(currentTappaIndex - 1);
            }
        }

        function nextTappa() {
            if (currentTappaIndex < currentItinerario.tappe.length - 1) {
                loadTappa(currentTappaIndex + 1);
            }
        }

        // ========================================
        // AVVIO
        // ========================================
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
